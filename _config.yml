# Hexo Configuration
title: Liwhcobra Blog
subtitle: 技术分享与个人思考
description: 一个技术博客，分享编程经验和思考
author: liwhcobra-lab
language: zh-CN
timezone: Asia/Shanghai

# URL
url: http://liwhcobra-lab.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
  lang: en

# Directory
source_dir: source
public_dir: public
tag_dir: tags
category_dir: categories
draft_dir: drafts
archive_dir: archives
page_dir: pages

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  exclude:
    - ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

# Home page settings
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Archive page settings
archive_generator:
  per_page: 0
  yearly: true
  monthly: true

# Category page settings
category_generator:
  per_page: 0
  order_by: -length
  layout: category

# Tag page settings
tag_generator:
  per_page: 0
  order_by: -length
  layout: tag

# Extensions
theme: landscape

# Deployment
deploy:
  type: git
  repo: https://github.com/liwhcobra-lab/liwhcobra-lab.github.io.git
  branch: gh-pages

# RSS
feed:
  type: atom
  path: atom.xml
  limit: 20
  content:
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date

# Pagination
paginate: 10
pagination_dir: page

# Markdown
markdown:
  pretty: true
  gfm: true
  break: true
  linkify: false
  quote: true
